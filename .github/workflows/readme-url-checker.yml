# Use awesome bot to verify that all URLs in the README are valid.
name: README URL Checker

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
          - uses: actions/checkout@v3

          - name: Set up Ruby
            uses: ruby/setup-ruby@v1
            with:
              ruby-version: 3.2
              # This replaces the entire "actions/cache" and "gem install" steps
              bundler-cache: true 

          - name: Run Awesome Bot
            env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
            run: |
              # Use 'bundle exec' to run the cached gem
              bundle exec awesome_bot README.md --allow-dupe --allow-redirect --allow 429
